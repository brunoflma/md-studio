<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Studio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230A1224' width='100' height='100'/><text x='50' y='58' text-anchor='middle' fill='%23C8A862' font-size='50' font-family='serif'>◆</text></svg>">

  <!-- Fontes: Libre Caslon Text (serifa) + IBM Plex Mono (técnica) -->
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

  <style>
    /* ══════════════════════════════════════════════════════════
       SISTEMA DE DESIGN "IMPERIAL MODERNITY"
       Navy profundo + Ouro metálico + Creme + Cantos retos
       Libre Caslon Text + IBM Plex Mono
       ══════════════════════════════════════════════════════════ */
    :root {
      /* ── Cores da paleta ─────────────────────── */
      --navy-deep:      #0A1224;
      --navy-dark:      #0E1A33;
      --ink-blue:       #14213D;
      --gold-metallic:  #C8A862;
      --gold-deep:      #B08D43;
      --gold-soft:      #D9C08A;
      --cream:          #F4F1E9;
      --body-blue:      #B7C0D8;
      --steel-blue:     #8E9ABA;
      --slate-grey:     #5B6478;

      /* ── Derivados ──────────────────────── */
      --bg-body:        #0A1224;
      --bg-surface:     #0E1A33;
      --bg-elevated:    #132040;
      --bg-code:        #0C1529;
      --bg-code-inline: #111D36;
      --bg-toolbar:     #070E1C;

      --text-primary:   #F4F1E9;
      --text-body:      #B7C0D8;
      --text-muted:     #8E9ABA;
      --text-dim:       #5B6478;

      --hairline:       rgba(244, 241, 233, .14);
      --hairline-strong: rgba(244, 241, 233, .22);
      --hairline-gold:  rgba(200, 168, 98, .30);

      /* ── Layout ─────────────────────────── */
      --toolbar-h:      48px;
      --content-max-w:  880px;
      --frame-inset:    40px;
      --frame-double-inset: 80px;
      --edge-inset:     40px;

      /* ── Tipografia ─────────────────────── */
      --font-serif: 'Libre Caslon Text', 'Georgia', 'Times New Roman', serif;
      --font-mono:  'IBM Plex Mono', 'Consolas', 'Fira Code', monospace;
    }

    /* ── Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      height: 100%; background: var(--bg-body); color: var(--text-body);
      font-family: var(--font-serif); font-size: 16px; line-height: 1.75;
      overflow: hidden;
    }

    /* ── Scrollbar ─────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--slate-grey); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--steel-blue); }

    /* ══════════════════════════════════════════
       Toolbar
       ══════════════════════════════════════════ */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      height: var(--toolbar-h); padding: 0 var(--edge-inset);
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--hairline);
      user-select: none; flex-shrink: 0;
    }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 6px; }
    .toolbar-left { min-width: 0; flex: 1; }
    .toolbar-right { flex-shrink: 0; }

    /* Marca A M F em mono */
    .toolbar-brand {
      font-family: var(--font-mono); font-size: 12px; font-weight: 600;
      letter-spacing: .42em; color: var(--cream); text-transform: uppercase;
      margin-right: 8px;
    }
    /* Losango separador ◆ */
    .toolbar-diamond {
      width: 7px; height: 7px; background: var(--gold-metallic);
      transform: rotate(45deg); flex-shrink: 0; margin: 0 10px;
    }

    .toolbar-title {
      font-family: var(--font-mono); font-size: 11.5px; font-weight: 400;
      color: var(--steel-blue); letter-spacing: .06em; text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 50vw;
    }
    .toolbar-title .ext { color: var(--slate-grey); }

    /* Toolbar icon buttons */
    .tb {
      display: inline-flex; align-items: center; justify-content: center;
      background: none; border: 1px solid transparent; color: var(--steel-blue);
      cursor: pointer; padding: 5px 7px; transition: all .15s ease;
    }
    .tb:hover { color: var(--cream); border-color: var(--hairline); }
    .tb.active { color: var(--gold-metallic); border-color: var(--hairline-gold); }
    .tb svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    /* Copiar — botão dourado fantasma */
    .tb-accent {
      display: inline-flex; align-items: center; gap: 5px;
      background: transparent; color: var(--gold-metallic);
      border: 1px solid var(--gold-metallic); cursor: pointer;
      padding: 4px 16px; font-family: var(--font-mono);
      font-size: 11px; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; transition: all .15s ease;
    }
    .tb-accent:hover { background: var(--gold-metallic); color: var(--navy-deep); }
    .tb-accent.copied { background: var(--gold-metallic); color: var(--navy-deep); }

    /* ══════════════════════════════════════════
       Welcome / Drop Zone
       ══════════════════════════════════════════ */
    .welcome {
      display: flex; align-items: center; justify-content: center;
      height: calc(100vh - var(--toolbar-h));
      height: calc(100dvh - var(--toolbar-h));
      padding: var(--edge-inset);
      position: relative; overflow-y: auto;
    }
    /* Moldura interna — assinatura do sistema */
    .welcome::before {
      content: ''; position: absolute;
      inset: var(--frame-inset);
      border: 1px solid var(--hairline);
      pointer-events: none;
    }
    .drop-zone {
      text-align: center; padding: 60px 48px; max-width: 500px; width: 100%;
      border: 1px solid var(--hairline-strong); background: var(--bg-surface);
      transition: all .3s ease; cursor: pointer; position: relative;
      margin: auto 0; flex-shrink: 0;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--gold-metallic);
      box-shadow: 0 0 40px rgba(200,168,98,.06);
    }
    .welcome-brand {
      font-family: var(--font-mono); font-size: 14px; font-weight: 600;
      letter-spacing: .5em; color: var(--gold-metallic); text-transform: uppercase;
    }
    .welcome-title {
      font-family: var(--font-serif); font-size: 2rem; font-weight: 400;
      color: var(--cream); margin-top: 20px; letter-spacing: -.02em;
      font-style: italic;
    }
    .welcome-sub {
      font-family: var(--font-mono); font-size: .75rem; font-weight: 400;
      color: var(--steel-blue); margin-top: 8px; letter-spacing: .12em;
      text-transform: uppercase;
    }
    .welcome-hr {
      width: 7px; height: 7px; background: var(--gold-metallic);
      transform: rotate(45deg); margin: 28px auto;
    }
    .welcome-hint {
      color: var(--slate-grey); font-family: var(--font-mono);
      font-size: .78rem; letter-spacing: .04em;
    }
    .welcome-hint code {
      background: var(--bg-code-inline); color: var(--gold-soft);
      padding: 2px 7px; font-family: var(--font-mono); font-size: .78rem;
      border: 1px solid var(--hairline);
    }
    .welcome-btn {
      margin-top: 28px; padding: 12px 40px;
      background: transparent; color: var(--gold-metallic);
      border: 1px solid var(--gold-metallic);
      font-family: var(--font-mono); font-weight: 600; font-size: .78rem;
      letter-spacing: .15em; text-transform: uppercase;
      cursor: pointer; transition: all .2s ease;
    }
    .welcome-btn:hover {
      background: var(--gold-metallic); color: var(--navy-deep);
    }
    .welcome-keys {
      margin-top: 24px; color: var(--slate-grey);
      font-family: var(--font-mono); font-size: .7rem;
      display: flex; justify-content: center; gap: 22px;
      letter-spacing: .04em;
    }
    kbd {
      background: var(--bg-code-inline); border: 1px solid var(--hairline-strong);
      padding: 2px 7px; font-family: var(--font-mono);
      font-size: .68rem; color: var(--steel-blue);
    }

    /* ══════════════════════════════════════════
       Content — Markdown Rendering
       "Documento dentro da tela"
       ══════════════════════════════════════════ */
    .content-wrapper {
      display: none; height: calc(100vh - var(--toolbar-h) - var(--frame-double-inset));
      height: calc(100dvh - var(--toolbar-h) - var(--frame-double-inset));
      overflow-y: auto; scroll-behavior: smooth; position: relative;
      margin: var(--frame-inset) 0; padding: 0 var(--frame-inset); box-sizing: border-box;
    }
    /* Moldura interna em todo o viewport de conteúdo */
    .content-wrapper::before {
      content: ''; position: fixed;
      top: calc(var(--toolbar-h) + var(--frame-inset)); left: var(--frame-inset);
      right: var(--frame-inset); bottom: var(--frame-inset);
      border: 1px solid var(--hairline);
      pointer-events: none; z-index: 10;
    }
    .content {
      max-width: var(--content-max-w); margin: 0 auto;
      padding: 52px 56px 80px;
      box-sizing: border-box;
      overflow-x: hidden;
      animation: fadeIn .35s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }

    .content > *:first-child { margin-top: 0; }

    /* ── Headers — Serifa, ouro para H1/H2 ── */
    .content h1 {
      font-family: var(--font-serif); font-size: 2.1rem; font-weight: 400;
      color: var(--cream); margin: 40px 0 18px;
      letter-spacing: -.02em; line-height: 1.3;
    }
    .content h2 {
      font-family: var(--font-serif); font-size: 1.55rem; font-weight: 700;
      color: var(--cream); margin: 36px 0 14px;
      letter-spacing: -.015em; line-height: 1.32;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--hairline);
    }
    .content h3 {
      font-family: var(--font-serif); font-size: 1.25rem; font-weight: 700;
      color: var(--cream); margin: 28px 0 10px; line-height: 1.35;
    }
    .content h4 {
      font-family: var(--font-serif); font-size: 1.05rem; font-weight: 700;
      color: var(--body-blue); margin: 22px 0 8px; line-height: 1.4;
    }
    .content h5, .content h6 {
      font-family: var(--font-mono); font-size: .82rem; font-weight: 600;
      color: var(--gold-metallic); margin: 18px 0 6px;
      letter-spacing: .08em; text-transform: uppercase;
    }

    /* ── Paragraphs & inline ───────────────── */
    .content p { margin: 13px 0; color: var(--body-blue); }
    .content a { color: var(--gold-metallic); text-decoration: none; transition: color .15s; border-bottom: 1px solid rgba(200,168,98,.3); }
    .content a:hover { color: var(--gold-soft); border-bottom-color: var(--gold-soft); }
    .content strong { font-weight: 700; color: var(--cream); }
    .content em { font-style: italic; color: var(--gold-soft); }
    .content img { max-width: 100%; margin: 18px 0; border: 1px solid var(--hairline); }

    /* ── Lists ──────────────────────────────── */
    .content ul, .content ol { margin: 11px 0; padding-left: 26px; color: var(--body-blue); }
    .content li { margin: 4px 0; }
    .content li > ul, .content li > ol { margin: 4px 0; }
    .content li::marker { color: var(--gold-metallic); }

    /* ── Task lists ─────────────────────────── */
    .content ul.contains-task-list { list-style: none; padding-left: 4px; }
    .content .task-list-item { display: flex; align-items: flex-start; gap: 8px; }
    .content .task-list-item input[type="checkbox"] {
      appearance: none; width: 15px; height: 15px;
      border: 1px solid var(--steel-blue); margin-top: 5px;
      cursor: pointer; flex-shrink: 0; background: transparent;
      transition: all .15s ease;
    }
    .content .task-list-item input[type="checkbox"]:checked {
      background: var(--gold-metallic); border-color: var(--gold-metallic);
      background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='%230A1224' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
    }

    /* ── Inline code — mono dourado ────────── */
    .content code:not(pre code) {
      background: var(--bg-code-inline); color: var(--gold-soft);
      padding: 2px 8px; font-family: var(--font-mono); font-size: .82em;
      font-weight: 500; word-break: break-word;
      border: 1px solid var(--hairline);
    }

    /* ── Code blocks ───────────────────────── */
    .content pre {
      position: relative; margin: 20px 0;
      background: var(--bg-code); border: 1px solid var(--hairline);
      overflow-x: auto; overflow-y: hidden;
      max-width: 100%;
    }
    .content pre code {
      display: block; padding: 18px 22px; overflow-x: auto;
      font-family: var(--font-mono); font-size: .82rem; line-height: 1.65;
      color: var(--body-blue); background: none;
      -webkit-overflow-scrolling: touch;
    }
    .content pre code.hljs { background: transparent; padding: 18px 22px; }

    /* ── Blockquote — barra dourada ─────────── */
    .content blockquote {
      margin: 16px 0; padding: 12px 20px;
      border-left: 2px solid var(--gold-metallic);
      color: var(--steel-blue);
      background: rgba(200,168,98,.03);
    }
    .content blockquote p { margin: 5px 0; }
    .content blockquote p:first-child { margin-top: 0; }
    .content blockquote p:last-child { margin-bottom: 0; }
    .content blockquote em { color: var(--gold-soft); }

    /* ── Tables — scroll on overflow ──────── */
    .content table {
      margin: 20px 0; border-collapse: collapse;
      font-size: .9rem; width: 100%; max-width: 100%;
      display: block; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .content thead th {
      text-align: left; padding: 10px 14px; font-weight: 600;
      color: var(--gold-metallic); font-family: var(--font-mono);
      font-size: .78rem; letter-spacing: .06em; text-transform: uppercase;
      border-bottom: 1px solid var(--hairline-strong);
      background: var(--bg-surface);
    }
    .content tbody td {
      padding: 10px 14px; border-bottom: 1px solid var(--hairline);
      color: var(--body-blue);
    }
    .content tbody tr:hover { background: rgba(244,241,233,.02); }

    /* ── Horizontal Rule — hairline degradê ─── */
    .content hr {
      border: none; height: 1px; margin: 34px 0;
      background: linear-gradient(90deg, var(--gold-metallic), transparent 80%);
      opacity: .35;
    }

    /* ══════════════════════════════════════════
       GFM Alerts
       ══════════════════════════════════════════ */
    .gfm-alert {
      margin: 16px 0; padding: 14px 20px;
      border-left: 2px solid; background: rgba(244,241,233,.02);
    }
    .gfm-alert-title {
      font-family: var(--font-mono); font-weight: 600; font-size: .78rem;
      margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .gfm-alert-note      { border-left-color: #3b82f6; }
    .gfm-alert-note      .gfm-alert-title { color: #6ba3f7; }
    .gfm-alert-tip       { border-left-color: var(--gold-metallic); }
    .gfm-alert-tip       .gfm-alert-title { color: var(--gold-metallic); }
    .gfm-alert-important { border-left-color: #a78bfa; }
    .gfm-alert-important .gfm-alert-title { color: #b9a0fb; }
    .gfm-alert-warning   { border-left-color: #eab308; }
    .gfm-alert-warning   .gfm-alert-title { color: #f0c73e; }
    .gfm-alert-caution   { border-left-color: #ef4444; }
    .gfm-alert-caution   .gfm-alert-title { color: #f07070; }

    /* ── Copy button on code blocks ────────── */
    .copy-code {
      position: absolute; top: 8px; right: 8px; display: inline-flex;
      align-items: center; gap: 4px; padding: 4px 10px;
      background: var(--bg-surface); border: 1px solid var(--hairline-strong);
      color: var(--slate-grey); font-family: var(--font-mono);
      font-size: 10px; letter-spacing: .04em; text-transform: uppercase;
      cursor: pointer; opacity: 0; transition: all .2s ease;
    }
    .copy-code svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .content pre:hover .copy-code { opacity: 1; }
    .copy-code:hover { border-color: var(--gold-metallic); color: var(--gold-metallic); }
    .copy-code.copied { border-color: var(--gold-metallic); color: var(--gold-metallic); }

    /* ── Editor View ────────────────────────── */
    .editor-wrapper {
      display: none; height: calc(100vh - var(--toolbar-h) - var(--frame-double-inset));
      height: calc(100dvh - var(--toolbar-h) - var(--frame-double-inset));
      position: relative;
      margin: var(--frame-inset) 0; padding: 0 var(--frame-inset);
      box-sizing: border-box;
    }
    .editor-wrapper::before {
      content: ''; position: fixed;
      top: calc(var(--toolbar-h) + var(--frame-inset)); left: var(--frame-inset);
      right: var(--frame-inset); bottom: var(--frame-inset);
      border: 1px solid var(--hairline);
      pointer-events: none; z-index: 10;
    }
    .editor-view {
      max-width: var(--content-max-w); margin: 0 auto; height: 100%;
      padding: 40px 56px 80px; box-sizing: border-box;
    }
    .editor-area {
      width: 100%; height: 100%; resize: none;
      background: var(--bg-code); color: var(--cream);
      border: 1px solid var(--hairline);
      padding: 20px 22px; box-sizing: border-box;
      font-family: var(--font-mono); font-size: .82rem; line-height: 1.7;
      letter-spacing: .01em; tab-size: 2; outline: none;
      transition: border-color .15s ease;
      caret-color: var(--gold-metallic);
    }
    .editor-area:focus { border-color: var(--hairline-gold); }
    .editor-area::selection { background: rgba(200,168,98,.28); }

    /* ── Edição inline (contenteditable sobre o preview) ── */
    .content[contenteditable="true"] { outline: none; }
    .content-wrapper.is-editing { caret-color: var(--gold-metallic); }
    .content[contenteditable="true"] ::selection { background: rgba(200,168,98,.28); }
    /* Selo discreto indicando o modo de edição */
    .content-wrapper.is-editing::after {
      content: 'EDITANDO'; position: fixed;
      top: calc(var(--toolbar-h) + var(--frame-inset) + 1px);
      right: calc(var(--frame-inset) + 1px);
      background: var(--gold-metallic); color: var(--navy-deep);
      font-family: var(--font-mono); font-size: 9px; font-weight: 600;
      letter-spacing: .14em; padding: 3px 9px; z-index: 11; pointer-events: none;
    }

    /* Indicador de alterações não salvas */
    .toolbar-title .dirty {
      color: var(--gold-metallic); font-weight: 600; margin-left: 4px;
    }

    /* ── Mermaid ────────────────────────────── */
    .mermaid { margin: 20px 0; text-align: center; }
    .mermaid svg { max-width: 100%; }

    /* ── Print ─────────────────────────────── */
    @media print {
      body { background: #fff; color: #14213D; }
      .toolbar { display: none; }
      .content-wrapper { height: auto; overflow: visible; }
      .content-wrapper::before { display: none; }
      .content { max-width: none; padding: 20px; }
      .content h1, .content h2, .content h3 { color: #14213D; }
      .content h2 { border-bottom-color: #ddd; }
      .content p, .content li, .content td { color: #333; }
      .content code:not(pre code) { background: #f0ede5; color: #B08D43; border-color: #ddd; }
      .content pre { border-color: #ccc; }
      .content pre code { color: #333; }
      .content hr { background: #ccc; opacity: 1; }
      .copy-code { display: none; }
      .footer-credit { color: #333; }
    }

    /* ── Footer credit ──────────────────────── */
    .footer-credit {
      position: fixed; bottom: 4px; left: 0; z-index: 20;
      width: 100%; padding-right: var(--edge-inset); box-sizing: border-box;
      text-align: right; white-space: nowrap;
      font-family: var(--font-mono); font-size: .65rem; font-weight: 400;
      color: var(--slate-grey); letter-spacing: .04em;
      opacity: .7; pointer-events: none;
    }

    /* ══════════════════════════════════════════
       Responsive — Tablet (≤ 768px)
       ══════════════════════════════════════════ */
    @media (max-width: 768px) {
      :root {
        --toolbar-h: 44px;
        --frame-inset: 14px;
        --frame-double-inset: 28px;
        --edge-inset: 14px;
      }

      /* Toolbar compact */
      .toolbar-left, .toolbar-right { gap: 4px; }
      .toolbar-diamond { margin: 0 6px; }
      .toolbar-title { font-size: 10.5px; max-width: 35vw; }
      .tb-accent { padding: 4px 12px; font-size: 11px; }

      /* Content */
      .content { padding: 36px 32px 60px; }
      .content h1 { font-size: 1.7rem; margin: 28px 0 14px; }
      .content h2 { font-size: 1.3rem; margin: 24px 0 10px; }
      .content h3 { font-size: 1.1rem; margin: 20px 0 8px; }

      /* Tables scroll horizontally */
      .content table {
        display: block; overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* Welcome */
      .drop-zone { padding: 40px 28px; }
      .welcome-title { font-size: 1.5rem; }

      /* Editor */
      .editor-view { padding: 28px 32px 60px; }

    }

    /* ══════════════════════════════════════════
       Responsive — Mobile (≤ 480px)
       ══════════════════════════════════════════ */
    @media (max-width: 480px) {
      :root {
        --toolbar-h: 42px;
        --frame-inset: 0px;
        --frame-double-inset: 0px;
        --edge-inset: 12px;
      }
      body { font-size: 15px; }

      /* Toolbar — minimal */
      .toolbar-diamond { display: none; }
      .toolbar-title { font-size: 9.5px; max-width: 28vw; }
      .tb { padding: 5px; }
      .tb svg { width: 14px; height: 14px; }
      .tb-accent { padding: 3px 10px; font-size: 10px; letter-spacing: .06em; }

      /* Frame — remove on mobile (too tight) */
      .content-wrapper::before,
      .editor-wrapper::before,
      .welcome::before { display: none; }

      /* Content — edge-to-edge */
      .content { padding: 24px 18px 50px; }
      .content h1 { font-size: 1.45rem; margin: 22px 0 10px; }
      .content h2 { font-size: 1.15rem; margin: 20px 0 8px; }
      .content h3 { font-size: 1.02rem; margin: 16px 0 6px; }
      .content h4 { font-size: .95rem; }
      .content pre code { padding: 14px 14px; font-size: .78rem; }
      .content blockquote { padding: 8px 14px; }
      .content code:not(pre code) { font-size: .78em; padding: 2px 5px; }

      /* Tables — forced scroll */
      .content table { font-size: .82rem; }
      .content thead th { padding: 8px 10px; font-size: .72rem; }
      .content tbody td { padding: 8px 10px; }

      /* Copy button — always visible on touch */
      .copy-code { opacity: 1; }

      /* Welcome */
      .drop-zone { padding: 32px 20px; }
      .welcome-title { font-size: 1.3rem; margin-top: 14px; }
      .welcome-sub { font-size: .72rem; }
      .welcome-btn { padding: 10px 28px; font-size: .75rem; }
      .welcome-keys { gap: 14px; font-size: .66rem; }

      /* Editor */
      .editor-view { padding: 20px 18px 50px; }
      .editor-area { font-size: .78rem; padding: 14px 14px; }

    }
  </style>
</head>
<body>

  <!-- ═══════════ Toolbar ═══════════ -->
  <header class="toolbar">
    <div class="toolbar-left">
      <button class="tb active" id="btnPreview" title="Preview">
        <svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button class="tb" id="btnEdit" title="Editar no documento (Ctrl+E)">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
      </button>
      <button class="tb" id="btnSource" title="Código-fonte Markdown (Ctrl+U)">
        <svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </button>
      <span class="toolbar-diamond"></span>
      <span class="toolbar-title" id="docTitle">
        <span class="ext">MD STUDIO</span>
      </span>
    </div>
    <div class="toolbar-right">
      <button class="tb-accent" id="btnSave" title="Salvar (Ctrl+S)" style="display:none">
        SALVAR
      </button>
      <button class="tb-accent" id="btnCopy" title="Copiar conteúdo Markdown">
        COPIAR
      </button>
      <button class="tb" id="btnOpen" title="Abrir arquivo (Ctrl+O)">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══════════ Welcome ═══════════ -->
  <div id="welcome" class="welcome">
    <div class="drop-zone" id="dropZone">
      <h1 class="welcome-title">Visualizador de Documentos</h1>
      <div class="welcome-hr"></div>
      <p class="welcome-hint">Arraste um arquivo <code>.md</code> aqui</p>
      <button class="welcome-btn" id="btnOpenWelcome">ABRIR ARQUIVO</button>
      <div class="welcome-keys">
        <span><kbd>Ctrl+O</kbd> abrir</span>
        <span><kbd>Ctrl+E</kbd> editar</span>
        <span><kbd>Ctrl+S</kbd> salvar</span>
      </div>
    </div>
  </div>

  <!-- ═══════════ Content ═══════════ -->
  <div class="content-wrapper" id="contentWrapper">
    <div class="content" id="content"></div>
  </div>
  <div class="editor-wrapper" id="editorWrapper">
    <div class="editor-view">
      <textarea id="editor" class="editor-area" spellcheck="false"
        placeholder="Digite ou cole Markdown aqui…"></textarea>
    </div>
  </div>

  <!-- ═══════════ Footer ═══════════ -->
  <div class="footer-credit">Desenvolvido Por Bruno Ferreira</div>

  <!-- ═══════════ Hidden file input ═══════════ -->
  <input type="file" id="fileInput" accept=".md,.markdown,.mdown,.mkd,.txt" style="display:none">

  <!-- ═══════════ Dependencies ═══════════ -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1.0.2/dist/turndown-plugin-gfm.js"></script>

  <script>
    /* ══════════════════════════════════════════
       State
       ══════════════════════════════════════════ */
    let currentMarkdown = '';
    let currentFilename = '';
    let currentFileHandle = null;
    let lastDirHandle = null;
    let viewMode = 'preview';
    let isDirty = false;
    let renderedMarkdown = null;   // markdown atualmente refletido no DOM do preview
    let contentEdited = false;     // houve digitação no modo inline desde a última entrada

    /* ── DOM refs ──────────────────────────── */
    const $ = id => document.getElementById(id);
    const content        = $('content');
    const contentWrapper = $('contentWrapper');
    const editorWrapper  = $('editorWrapper');
    const editor         = $('editor');
    const welcome        = $('welcome');
    const dropZone       = $('dropZone');
    const docTitle       = $('docTitle');
    const fileInput      = $('fileInput');
    const btnPreview     = $('btnPreview');
    const btnSource      = $('btnSource');
    const btnEdit        = $('btnEdit');
    const btnSave        = $('btnSave');
    const btnCopy        = $('btnCopy');
    const btnOpen        = $('btnOpen');
    const btnOpenW       = $('btnOpenWelcome');

    /* ══════════════════════════════════════════
       Init
       ══════════════════════════════════════════ */
    if (typeof mermaid !== 'undefined') {
      mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose',
        themeVariables: {
          darkMode: true, background: '#0A1224',
          primaryColor: '#14213D', primaryTextColor: '#F4F1E9',
          lineColor: '#C8A862', secondaryColor: '#0E1A33',
        }
      });
    }

    /* ══════════════════════════════════════════
       Rendering Pipeline
       ══════════════════════════════════════════ */
    // Carga inicial de um documento (arquivo aberto, colado ou arrastado)
    async function renderMarkdown(text, filename) {
      currentMarkdown = text;
      currentFilename = filename || '';
      isDirty = false;
      updateTitle();

      await renderContent(text);

      welcome.style.display = 'none';
      btnSave.style.display = 'inline-flex';
      setView('preview');
      contentWrapper.scrollTop = 0;
    }

    // Renderiza Markdown -> HTML dentro de #content (pipeline completo)
    async function renderContent(text) {
      content.innerHTML = marked.parse(text, { gfm: true, breaks: true });
      processAlerts(content);
      highlightCode(content);
      addCopyButtons(content);
      await renderMermaidBlocks(content);
      renderMath(content);
      renderedMarkdown = text;   // o DOM agora reflete exatamente este markdown
    }

    /* ── Título + indicador de alterações ──── */
    function updateTitle() {
      const displayName = currentFilename
        ? currentFilename.replace(/\.(md|markdown|mdown|mkd|txt)$/i, '').replace(/[_-]/g, ' ')
        : 'Documento';
      const dirtyMark = isDirty ? '<span class="dirty">●</span>' : '';
      docTitle.innerHTML = `${escHtml(displayName).toUpperCase()}<span class="ext"> · MD</span>${dirtyMark}`;
      document.title = `${isDirty ? '● ' : ''}${displayName} — MD Studio`;
    }

    function markDirty() {
      if (isDirty) return;
      isDirty = true;
      updateTitle();
    }

    /* ── GFM Alerts ────────────────────────── */
    function processAlerts(container) {
      const cfg = {
        note:      { label: 'Note',      icon: 'ℹ️'  },
        tip:       { label: 'Tip',       icon: '◆' },
        important: { label: 'Important', icon: '◆' },
        warning:   { label: 'Warning',   icon: '⚠'  },
        caution:   { label: 'Caution',   icon: '◆' },
      };
      container.querySelectorAll('blockquote').forEach(bq => {
        const fp = bq.querySelector('p');
        if (!fp) return;
        const m = fp.innerHTML.match(/^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(?:<br\s*\/?>)?\s*/i);
        if (!m) return;
        const type = m[1].toLowerCase();
        const c = cfg[type];
        bq.className = `gfm-alert gfm-alert-${type}`;
        fp.innerHTML = fp.innerHTML.slice(m[0].length);
        const title = document.createElement('div');
        title.className = 'gfm-alert-title';
        title.innerHTML = `${c.icon} ${c.label}`;
        bq.insertBefore(title, bq.firstChild);
      });
    }

    /* ── Syntax Highlighting ───────────────── */
    function highlightCode(container) {
      if (typeof hljs === 'undefined') return;
      container.querySelectorAll('pre code').forEach(el => {
        if (el.classList.contains('language-mermaid')) return;
        hljs.highlightElement(el);
      });
    }

    /* ── Copy Buttons on Code Blocks ───────── */
    function addCopyButtons(container) {
      const copyIcon = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="1"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
      const checkIcon = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';
      container.querySelectorAll('pre').forEach(pre => {
        const code = pre.querySelector('code');
        if (!code) return;
        const btn = document.createElement('button');
        btn.className = 'copy-code';
        btn.innerHTML = copyIcon;
        btn.onclick = async () => {
          try {
            await navigator.clipboard.writeText(code.textContent);
            btn.innerHTML = checkIcon + ' OK';
            btn.classList.add('copied');
            setTimeout(() => { btn.innerHTML = copyIcon; btn.classList.remove('copied'); }, 2000);
          } catch (e) { console.error('Copy failed', e); }
        };
        pre.appendChild(btn);
      });
    }

    /* ── Mermaid ────────────────────────────── */
    async function renderMermaidBlocks(container) {
      if (typeof mermaid === 'undefined') return;
      const blocks = container.querySelectorAll('code.language-mermaid');
      if (!blocks.length) return;
      blocks.forEach(code => {
        const pre = code.parentElement;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        div.dataset.src = code.textContent;   // preserva fonte p/ HTML→Markdown
        pre.replaceWith(div);
      });
      try { await mermaid.run(); } catch (e) { console.warn('Mermaid render error', e); }
    }

    /* ── KaTeX Math ─────────────────────────── */
    function renderMath(container) {
      if (typeof renderMathInElement === 'undefined') return;
      try {
        renderMathInElement(container, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '\\[', right: '\\]', display: true },
            { left: '$', right: '$', display: false },
            { left: '\\(', right: '\\)', display: false },
          ],
          throwOnError: false,
          ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        });
      } catch (e) { console.warn('KaTeX render error', e); }
    }

    /* ══════════════════════════════════════════
       HTML → Markdown (round-trip da edição inline)
       ══════════════════════════════════════════ */
    let turndown = null;
    function getTurndown() {
      if (turndown || typeof TurndownService === 'undefined') return turndown;
      turndown = new TurndownService({
        headingStyle: 'atx', hr: '---', bulletListMarker: '-',
        codeBlockStyle: 'fenced', fence: '```',
        emDelimiter: '*', strongDelimiter: '**', linkStyle: 'inlined',
      });
      if (typeof turndownPluginGfm !== 'undefined') turndown.use(turndownPluginGfm.gfm);

      // Alertas GFM (div.gfm-alert) -> blockquote "> [!TIPO]"
      turndown.addRule('gfmAlert', {
        filter: n => n.nodeType === 1 && n.classList?.contains('gfm-alert'),
        replacement: (content, node) => {
          const typeClass = [...node.classList].find(c => c.startsWith('gfm-alert-') && c !== 'gfm-alert');
          const type = (typeClass ? typeClass.slice('gfm-alert-'.length) : 'note').toUpperCase();
          const clone = node.cloneNode(true);
          clone.querySelector('.gfm-alert-title')?.remove();
          const inner = turndown.turndown(clone.innerHTML).trim();
          const body = inner ? inner.split('\n').map(l => l ? '> ' + l : '>').join('\n') : '';
          return `\n\n> [!${type}]\n${body}\n\n`;
        },
      });

      // Mermaid (div.mermaid) -> bloco ```mermaid a partir da fonte preservada
      turndown.addRule('mermaid', {
        filter: n => n.nodeType === 1 && n.nodeName === 'DIV' && n.classList?.contains('mermaid'),
        replacement: (content, node) => `\n\n\`\`\`mermaid\n${(node.dataset.src || '').trim()}\n\`\`\`\n\n`,
      });

      // KaTeX (span.katex) -> $tex$ / $$tex$$ a partir da anotação TeX embutida
      turndown.addRule('katex', {
        filter: n => n.nodeType === 1 && n.nodeName === 'SPAN' && n.classList?.contains('katex'),
        replacement: (content, node) => {
          const ann = node.querySelector('annotation[encoding="application/x-tex"]');
          const tex = ann ? ann.textContent : node.textContent;
          return node.closest('.katex-display') ? `\n\n$$${tex}$$\n\n` : `$${tex}$`;
        },
      });
      // Evita dupla emissão do wrapper de display do KaTeX
      turndown.addRule('katexDisplay', {
        filter: n => n.nodeType === 1 && n.classList?.contains('katex-display'),
        replacement: content => content,
      });

      return turndown;
    }

    function htmlToMarkdown(container) {
      const td = getTurndown();
      if (!td) return currentMarkdown;   // sem biblioteca: não corrompe a fonte
      // Remove botões de copiar antes de converter
      const clone = container.cloneNode(true);
      clone.querySelectorAll('.copy-code').forEach(b => b.remove());
      let md = td.turndown(clone.innerHTML);
      return md
        .replace(/^(\s*)([-*+])\s{2,}/gm, '$1$2 ')      // marcador de lista -> 1 espaço
        .replace(/^(\s*)(\d+)\.\s{2,}/gm, '$1$2. ')     // lista ordenada -> 1 espaço
        .replace(/\n{3,}/g, '\n\n')                      // no máx. 1 linha em branco
        .replace(/[ \t]+$/gm, '')                        // sem espaços ao fim da linha
        .trim() + '\n';
    }

    /* ══════════════════════════════════════════
       File Handling
       ══════════════════════════════════════════ */
    function openFilePicker() {
      if (window.showOpenFilePicker) {
        const opts = {
          types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md', '.markdown', '.mdown', '.mkd'] } }],
          multiple: false,
        };
        // Remember last directory
        if (lastDirHandle) opts.startIn = lastDirHandle;
        else if (currentFileHandle) opts.startIn = currentFileHandle;

        window.showOpenFilePicker(opts).then(async ([handle]) => {
          currentFileHandle = handle;
          // Store parent directory for next open
          if (handle.getParent) {
            try { lastDirHandle = await handle.getParent(); } catch (e) {}
          }
          const file = await handle.getFile();
          const text = await file.text();
          renderMarkdown(text, file.name);
        }).catch(() => {});
      } else {
        fileInput.click();
      }
    }

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => renderMarkdown(reader.result, file.name);
      reader.readAsText(file);
      fileInput.value = '';
    });



    /* ══════════════════════════════════════════
       View Toggle
       ══════════════════════════════════════════ */
    // Incorpora as edições do modo atual em currentMarkdown
    function commitCurrentView() {
      if (viewMode === 'edit' && contentEdited) {
        const md = htmlToMarkdown(content);
        currentMarkdown = md;
        renderedMarkdown = md;        // o DOM editado já representa este markdown
      } else if (viewMode === 'source') {
        if (editor.value !== currentMarkdown) currentMarkdown = editor.value;
      }
    }

    async function setView(mode) {
      commitCurrentView();
      content.contentEditable = 'false';

      // Modos que mostram o conteúdo renderizado: re-renderizar se a fonte mudou
      if ((mode === 'preview' || mode === 'edit') && currentMarkdown !== renderedMarkdown) {
        await renderContent(currentMarkdown);
      }

      viewMode = mode;
      contentWrapper.style.display = (mode === 'preview' || mode === 'edit') ? 'block' : 'none';
      editorWrapper.style.display  = (mode === 'source') ? 'block' : 'none';

      btnPreview.classList.toggle('active', mode === 'preview');
      btnEdit.classList.toggle('active',    mode === 'edit');
      btnSource.classList.toggle('active',  mode === 'source');

      if (mode === 'edit') {
        contentEdited = false;
        content.contentEditable = 'true';
        contentWrapper.classList.add('is-editing');
        content.focus();
      } else {
        contentWrapper.classList.remove('is-editing');
      }
      if (mode === 'source') { editor.value = currentMarkdown; editor.focus(); }
    }

    /* ══════════════════════════════════════════
       Save
       ══════════════════════════════════════════ */
    async function saveFile() {
      // Incorpora edição pendente (inline ou código-fonte) antes de salvar
      commitCurrentView();
      if (!currentMarkdown) return;

      const flash = ok => {
        const orig = btnSave.textContent;
        btnSave.textContent = ok ? 'SALVO' : 'ERRO';
        btnSave.classList.add('copied');
        setTimeout(() => { btnSave.textContent = orig; btnSave.classList.remove('copied'); }, 2000);
      };

      // 1) Grava de volta no próprio arquivo (File System Access API)
      if (currentFileHandle && currentFileHandle.createWritable) {
        try {
          const perm = currentFileHandle.queryPermission
            ? await currentFileHandle.queryPermission({ mode: 'readwrite' })
            : 'granted';
          if (perm !== 'granted' && currentFileHandle.requestPermission) {
            const req = await currentFileHandle.requestPermission({ mode: 'readwrite' });
            if (req !== 'granted') throw new Error('Permissão negada');
          }
          const writable = await currentFileHandle.createWritable();
          await writable.write(currentMarkdown);
          await writable.close();
          isDirty = false; updateTitle(); flash(true);
          return;
        } catch (e) { console.error('Save failed', e); flash(false); return; }
      }

      // 2) "Salvar como" se a API existir mas não houver handle
      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: currentFilename || 'documento.md',
            types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md', '.markdown'] } }],
          });
          const writable = await handle.createWritable();
          await writable.write(currentMarkdown);
          await writable.close();
          currentFileHandle = handle;
          currentFilename = handle.name || currentFilename;
          isDirty = false; updateTitle(); flash(true);
          return;
        } catch (e) { if (e.name !== 'AbortError') { console.error(e); flash(false); } return; }
      }

      // 3) Fallback: download
      const blob = new Blob([currentMarkdown], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = currentFilename || 'documento.md';
      a.click();
      URL.revokeObjectURL(url);
      isDirty = false; updateTitle(); flash(true);
    }

    /* ══════════════════════════════════════════
       Copy All
       ══════════════════════════════════════════ */
    async function copyAll() {
      if (!currentMarkdown) return;
      try {
        await navigator.clipboard.writeText(currentMarkdown);
        const orig = btnCopy.textContent;
        btnCopy.textContent = 'COPIADO';
        btnCopy.classList.add('copied');
        setTimeout(() => { btnCopy.textContent = orig; btnCopy.classList.remove('copied'); }, 2000);
      } catch (e) { console.error('Copy failed', e); }
    }

    /* ══════════════════════════════════════════
       Drag & Drop
       ══════════════════════════════════════════ */
    let dragCounter = 0;
    document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dropZone?.classList.add('drag-over'); });
    document.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropZone?.classList.remove('drag-over'); } });
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
      e.preventDefault(); dragCounter = 0; dropZone?.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && /\.(md|markdown|mdown|mkd|txt)$/i.test(file.name)) {
        const reader = new FileReader();
        reader.onload = () => renderMarkdown(reader.result, file.name);
        reader.readAsText(file);
      }
    });

    /* ══════════════════════════════════════════
       Paste Support
       ══════════════════════════════════════════ */
    document.addEventListener('paste', e => {
      if (viewMode === 'edit' || viewMode === 'source') return;  // deixa a colagem nativa agir
      if (welcome.style.display !== 'none' || !currentMarkdown) {
        const text = e.clipboardData?.getData('text/plain');
        if (text && text.length > 10) {
          e.preventDefault();
          renderMarkdown(text, 'Colado');
        }
      }
    });

    /* ══════════════════════════════════════════
       Event Listeners
       ══════════════════════════════════════════ */
    btnOpen.addEventListener('click', openFilePicker);
    btnOpenW.addEventListener('click', openFilePicker);
    dropZone.addEventListener('click', openFilePicker);
    btnPreview.addEventListener('click', () => setView('preview'));
    btnSource.addEventListener('click', () => setView('source'));
    btnEdit.addEventListener('click', startEditing);
    btnSave.addEventListener('click', saveFile);
    btnCopy.addEventListener('click', copyAll);

    // Edição inline no documento renderizado
    content.addEventListener('input', () => { contentEdited = true; markDirty(); });
    // Marca alterações conforme o usuário digita no código-fonte
    editor.addEventListener('input', markDirty);
    // Tab insere indentação em vez de mudar o foco
    editor.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = editor.selectionStart, end = editor.selectionEnd;
        editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(end);
        editor.selectionStart = editor.selectionEnd = s + 2;
      }
    });

    // Abre o modo de edição (cria documento em branco se nada estiver carregado)
    function startEditing() {
      if (welcome.style.display !== 'none') {
        welcome.style.display = 'none';
        btnSave.style.display = 'inline-flex';
        currentMarkdown = currentMarkdown || '';
        if (!currentFilename) { currentFilename = 'documento.md'; updateTitle(); }
      }
      setView('edit');
    }

    document.addEventListener('keydown', e => {
      const ctrl = e.ctrlKey || e.metaKey;
      if (ctrl && e.key === 'o') { e.preventDefault(); openFilePicker(); }
      if (ctrl && e.key === 's') { e.preventDefault(); saveFile(); }
      if (ctrl && (e.key === 'e' || e.key === 'E')) {
        e.preventDefault();
        if (viewMode === 'edit') setView('preview');
        else startEditing();
      }
      if (ctrl && e.key === 'u') { e.preventDefault(); setView(viewMode === 'source' ? 'preview' : 'source'); }
    });

    // Avisa se houver alterações não salvas ao fechar
    window.addEventListener('beforeunload', e => {
      if (isDirty) { e.preventDefault(); e.returnValue = ''; }
    });

    /* ══════════════════════════════════════════
       Utils
       ══════════════════════════════════════════ */
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
